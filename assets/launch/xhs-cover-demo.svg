<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.5" stop-color="#164E63"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="20%" r="80%">
      <stop offset="0" stop-color="#67E8F9" stop-opacity="0.75"/>
      <stop offset="0.45" stop-color="#22C55E" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1080" height="1440" fill="url(#bg)"/>
  <rect width="1080" height="1440" fill="url(#glow)"/>
  <text x="72" y="150" fill="#D1FAE5" font-size="34" font-family="PingFang SC, Hiragino Sans GB, Arial Unicode MS">给每天用 Codex 的人</text>
  <text x="72" y="260" fill="#FFFFFF" font-size="88" font-weight="800" font-family="PingFang SC, Hiragino Sans GB, Arial Unicode MS">别再一天打开</text>
  <text x="72" y="370" fill="#FFFFFF" font-size="88" font-weight="800" font-family="PingFang SC, Hiragino Sans GB, Arial Unicode MS">十几次额度页了</text>
  <text x="72" y="470" fill="#A7F3D0" font-size="48" font-weight="700" font-family="PingFang SC, Hiragino Sans GB, Arial Unicode MS">我做了个 Mac 桌面小组件</text>
  <g filter="url(#shadow)">
    <rect x="98" y="620" width="884" height="510" rx="48" fill="#FFFFFF" fill-opacity="0.16" stroke="#FFFFFF" stroke-opacity="0.28"/>
    <circle cx="212" cy="732" r="42" fill="#34D399"/>
    <text x="280" y="720" fill="#FFFFFF" font-size="54" font-weight="800" font-family="PingFang SC, Hiragino Sans GB, Arial Unicode MS">Codex 额度</text>
    <text x="280" y="775" fill="#BBF7D0" font-size="34" font-family="PingFang SC, Hiragino Sans GB, Arial Unicode MS">可用</text>
    <circle cx="350" cy="955" r="145" fill="#22D3EE" fill-opacity="0.85"/>
    <circle cx="350" cy="955" r="145" fill="#34D399" fill-opacity="0.48"/>
    <text x="270" y="980" fill="#FFFFFF" font-size="88" font-weight="800" font-family="PingFang SC, Hiragino Sans GB, Arial Unicode MS">99%</text>
    <rect x="540" y="850" width="346" height="88" rx="22" fill="#111827" fill-opacity="0.45"/>
    <text x="570" y="906" fill="#FFFFFF" font-size="34" font-weight="700" font-family="PingFang SC, Hiragino Sans GB, Arial Unicode MS">5小时窗口 99%</text>
    <rect x="540" y="970" width="346" height="88" rx="22" fill="#111827" fill-opacity="0.45"/>
    <text x="570" y="1026" fill="#FFFFFF" font-size="34" font-weight="700" font-family="PingFang SC, Hiragino Sans GB, Arial Unicode MS">7天窗口 72%</text>
  </g>
  <text x="72" y="1280" fill="#FFFFFF" font-size="42" font-weight="700" font-family="PingFang SC, Hiragino Sans GB, Arial Unicode MS">绿 / 黄 / 红 一眼知道还能不能继续写</text>
  <text x="72" y="1345" fill="#BAE6FD" font-size="30" font-family="PingFang SC, Hiragino Sans GB, Arial Unicode MS">开源：Codex LED Widget for macOS</text>
</svg>
