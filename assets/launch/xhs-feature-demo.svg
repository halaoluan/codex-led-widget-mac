<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <rect width="1080" height="1440" fill="#0B1120"/>
  <text x="72" y="135" fill="#FFFFFF" font-size="72" font-weight="800" font-family="PingFang SC, Hiragino Sans GB, Arial Unicode MS">这个小组件</text>
  <text x="72" y="220" fill="#FFFFFF" font-size="72" font-weight="800" font-family="PingFang SC, Hiragino Sans GB, Arial Unicode MS">我最常用 4 个点</text>
  <g font-family="PingFang SC, Hiragino Sans GB, Arial Unicode MS">
    <rect x="72" y="320" width="420" height="280" rx="28" fill="#111827" stroke="#334155"/>
    <circle cx="130" cy="390" r="26" fill="#22C55E"/>
    <text x="170" y="402" fill="#FFFFFF" font-size="38" font-weight="800">额度状态</text>
    <text x="112" y="500" fill="#CBD5E1" font-size="34">绿 / 黄 / 红</text>
    <text x="112" y="550" fill="#CBD5E1" font-size="34">一眼判断</text>
    <rect x="588" y="320" width="420" height="280" rx="28" fill="#111827" stroke="#334155"/>
    <text x="628" y="402" fill="#FFFFFF" font-size="38" font-weight="800">恢复倒计时</text>
    <text x="628" y="500" fill="#CBD5E1" font-size="34">5 小时窗口</text>
    <text x="628" y="550" fill="#CBD5E1" font-size="34">7 天窗口</text>
    <rect x="72" y="690" width="420" height="280" rx="28" fill="#111827" stroke="#334155"/>
    <text x="112" y="772" fill="#FFFFFF" font-size="38" font-weight="800">小中大尺寸</text>
    <text x="112" y="870" fill="#CBD5E1" font-size="34">桌面空间少</text>
