  <rect x="72" y="1080" width="936" height="150" rx="28" fill="#ECFEFF"/>
  <text x="120" y="1168" fill="#155E75" font-size="42" font-weight="800" font-family="PingFang SC, Hiragino Sans GB, Arial Unicode MS">适合每天高频使用 Codex 的人</text>
  <text x="72" y="1340" fill="#94A3B8" font-size="30" font-family="PingFang SC, Hiragino Sans GB, Arial Unicode MS">GitHub: halaoluan/codex-led-widget-mac</text>
